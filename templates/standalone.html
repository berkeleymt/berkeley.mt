{% extends "base.html" %}

{% block content %}

<div class="flex flex-col gap-3">

    {{ macros::newline_break(str=page.title) }}

</div>

{% if page.content %}
<main id="content" class="prose">
  {{ page.content | safe }}
</main>
{% endif %}

{% endblock %}
