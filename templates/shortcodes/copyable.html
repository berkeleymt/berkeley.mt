{% set id = title | slugify %}
<div class="not-prose my-3">
  <div class="flex items-center justify-between bg-gray-100 border border-gray-200 rounded-t-lg px-4 py-2">
    <span class="font-medium text-sm">{{ title }}</span>
    <button
      onclick="
        const text = document.getElementById('copyable-{{ id }}').innerText;
        navigator.clipboard.writeText(text).then(() => {
          const btn = this;
          btn.innerHTML = '<i class=\'bi bi-check-lg text-green-600\'></i> Copied!';
          setTimeout(() => { btn.innerHTML = '<i class=\'bi bi-clipboard\'></i> Copy'; }, 2000);
        });
      "
      class="inline-flex items-center gap-1.5 text-sm px-3 py-1 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer"
    >
      <i class="bi bi-clipboard"></i> Copy
    </button>
  </div>
  <pre id="copyable-{{ id }}" class="bg-white border border-t-0 border-gray-200 rounded-b-lg px-4 py-3 text-sm whitespace-pre-wrap font-mono">{{ body }}</pre>
</div>
